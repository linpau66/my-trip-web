                const offset = 8;
                const labelWidth = (p.name || "").length * 10 + 16;
                const labelHeight = 20;
                let lx = p.x + offset;
                let ly = p.y - labelHeight / 2;
                if (p.dir === "top") { lx = p.x - labelWidth / 2; ly = p.y - offset - labelHeight; }

                    </div>
                    
                    <div className="relative aspect-[16/10] bg-blue-50/30 rounded-xl border border-blue-50 shadow-inner overflow-hidden touch-manipulation" onClick={() => setActiveLabelIdx(null)}>
                        <svg viewBox="0 0 400 250" className="w-full h-full transition-all duration-700">
                            {isSeoul ? (
                                <g>
                                    <path d="M50,140 Q150,150 250,130 T400,160" fill="none" stroke="#bae6fd" strokeWidth="12" opacity="0.3" /> 
                                    <path d="M100,60 Q200,40 300,60 T350,120 T300,180 T150,200 T50,140 Z" fill="#fff" stroke="#cbd5e1" strokeWidth="1" />
                                </g>
                            ) : (
                                <path d="M360,110 C390,140 350,190 300,210 C240,230 150,230 80,200 C30,170 10,120 40,70 C70,30 160,10 240,20 C320,30 340,80 360,110 Z" fill="#fff" stroke="#fb7185" strokeWidth="1.5" />
                            )}
                            {Object.entries(coords).map(([name, pos]) => (!pos.skip && <circle key={name} cx={pos.x} cy={pos.y} r="2" fill="#fda4af" opacity="0.15" />))}
                            {points.length > 1 && (<polyline points={points.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke="#fb7185" strokeWidth="1.5" strokeDasharray="5 3" opacity="0.4" />)}
                            {points.map((p, i) => (<circle key={`pt-${i}`} cx={p.x} cy={p.y} r="4" fill="#e11d48" className="shadow-sm" />))}
                            {points.map((p, i) => {
                                if (i === activeLabelIdx) return null;
                                const l = getLabelPos(p);
                                return (
                                    <g key={`lbl-${i}`} className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setActiveLabelIdx(i); }}>
                                        <rect x={l.x} y={l.y} width={l.w} height={l.h} rx="4" fill="white" stroke="#fb7185" strokeWidth="1" />
                                        <text x={l.x + l.w/2} y={l.y + l.h/2 + 3} fontSize="8" fontWeight="bold" fill="#334155" textAnchor="middle">{i + 1}. {p.name}</text>
                                    </g>
                                );
                            })}
                            {activeLabelIdx !== null && points[activeLabelIdx] && (
                                (() => {
                                    const p = points[activeLabelIdx];
                                    const l = getLabelPos(p);
                                    return (
                                        <g className="cursor-pointer" onClick={(e) => { e.stopPropagation(); openNaverMap(p.kr); }}>
                                            <rect x={l.x} y={l.y} width={l.w} height={l.h} rx="4" fill="white" stroke="#e11d48" strokeWidth="2" className="shadow-lg" />
                                            <text x={l.x + l.w/2} y={l.y + l.h/2 + 3} fontSize="8" fontWeight="black" fill="#e11d48" textAnchor="middle">{activeLabelIdx + 1}. {p.name}</text>
                                        </g>
                                    );
                                })()
                            )}
                        </svg>
                        {selectedDayIndex === null && (
                            <div className="absolute inset-0 bg-white/40 flex items-center justify-center backdrop-blur-[1px]">
                                <p className="bg-white/90 px-4 py-1.5 rounded-full border border-rose-200 text-rose-500 font-bold shadow-lg text-xs md:text-sm text-center">
                                    請點選下方日期查看行程地圖
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- 主程式 App ---
        function App() {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedDayIndex, setSelectedDayIndex] = useState(null);

            const filteredDays = useMemo(() => {
                let result = itineraryData;
                if (selectedDayIndex !== null) result = result.filter((_, idx) => idx === selectedDayIndex);
                if (searchTerm) {
                    result = result.filter(day => 
                        day.events.some(event => 
                            event.spot.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            event.kr.includes(searchTerm)
                        )
                    );
                }
                return result;
            }, [searchTerm, selectedDayIndex]);

            return (
                <div className="min-h-screen bg-rose-50 p-2 md:p-8 font-sans text-slate-800 pb-20">
                    <div className="max-w-4xl mx-auto bg-white rounded-2xl md:rounded-3xl shadow-2xl overflow-hidden border border-rose-100">
                        
                        {/* Header */}
                        <div className="bg-gradient-to-r from-rose-400 to-orange-300 p-5 md:p-8 text-white text-center">
                            <div className="flex justify-center items-center gap-2 mb-2">
                                <Icon name="heart" size={20} className="fill-white" />
                                <h1 className="text-2xl md:text-3xl font-black tracking-tight uppercase">Korea Honeymoon</h1>
                                <Icon name="heart" size={20} className="fill-white" />
                            </div>
                            <p className="opacity-90 text-sm md:text-lg italic mb-4 md:mb-6 text-shadow-sm font-bold">蜜月旅行行程表 · 3.23 - 4.2</p>
                            
                            <div className="relative max-w-md mx-auto mb-6">
                                <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-rose-500" />
                                <input 
                                    type="text" 
                                    placeholder="搜尋景點 (如: 熟成到, 塗鴉秀...)" 
                                    className="w-full pl-11 pr-4 py-2.5 rounded-full border-none text-slate-800 shadow-xl outline-none text-sm font-medium"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>

                            {/* 日期選擇按鈕 */}
                            <div className="flex overflow-x-auto pb-4 gap-2 no-scrollbar px-1 touch-pan-x">
                                <button
                                    onClick={() => setSelectedDayIndex(null)}
                                    className={`flex-shrink-0 px-5 py-2 rounded-xl text-xs font-black transition-all ${
                                        selectedDayIndex === null ? 'bg-white text-rose-500 shadow-lg scale-105' : 'bg-rose-500/30 text-white'
                                    }`}
                                >
                                    ALL
                                </button>
                                {itineraryData.map((day, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => setSelectedDayIndex(idx)}
                                        className={`flex-shrink-0 px-4 py-2 rounded-xl text-xs font-black transition-all text-center flex flex-col items-center min-w-[75px] ${
                                            selectedDayIndex === idx ? 'bg-white text-rose-500 shadow-lg scale-105' : 'bg-rose-500/30 text-white'
                                        }`}
                                    >
                                        <span>DAY {idx + 1}</span>
                                        <span className="text-[8px] opacity-80 mt-0.5 font-bold">{day.date}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* 地圖區 */}
                        <div className="px-3 md:px-8 mt-4 md:mt-6">
                            <UnifiedMap selectedDayIndex={selectedDayIndex} />
                        </div>

                        {/* 行程列表 */}
                        <div className="p-3 md:p-8">
                            {filteredDays.length === 0 ? (
                                <div className="text-center py-20 text-slate-400 text-sm">找不到符合搜尋條件的景點。</div>
                            ) : (
                                filteredDays.map((day) => {
                                    const actualIdx = itineraryData.indexOf(day);
                                    return (
                                        <div key={actualIdx} className="relative animate-fadeIn mb-10 md:mb-16">
                                            <div className="flex items-center gap-2 mb-5">
                                                <div className="bg-rose-500 text-white px-4 py-1.5 rounded-xl font-bold shadow-md flex items-center gap-1.5 text-sm">
                                                    <Icon name="calendar" size={14} /> {day.day} ({day.date})
                                                </div>
                                                <div className="text-slate-400 text-[10px] md:text-xs font-bold bg-slate-50 px-2 py-1 rounded-lg border border-slate-100 flex items-center gap-1">
                                                    <Icon name="mapPin" size={10} className="text-rose-400" /> {day.location}
                                                </div>
                                            </div>

                                            <div className="space-y-5 ml-2 md:ml-3 border-l-2 border-dashed border-rose-100 pl-6 md:pl-8">
                                                {day.events.map((event, eIdx) => (
                                                    <div key={eIdx} className={`relative group transition-all ${event.spot.includes("回到飯店休息") ? "opacity-95" : ""}`}>
                                                        {/* 時間軸圓點 */}
                                                        <div className={`absolute -left-[31px] md:-left-[41px] top-5 w-4 h-4 md:w-5 md:h-5 rounded-full bg-white border-2 md:border-4 z-10 shadow-sm ${event.spot.includes("回到飯店休息") ? "border-slate-300" : "border-rose-400"}`}></div>
                                                        
                                                        <div className="flex flex-col gap-2">
                                                            <div className="flex flex-col md:flex-row md:items-start justify-between gap-1">
                                                                <div className="flex items-baseline gap-2">
                                                                    <span className={`font-mono font-black text-base md:text-lg ${event.spot.includes("回到飯店休息") ? "text-slate-400" : "text-rose-500"}`}>
                                                                        {event.time}
                                                                    </span>
                                                                    <h3 className={`font-black text-base md:text-xl leading-tight ${event.spot.includes("回到飯店休息") ? "text-slate-500" : "text-slate-800"}`}>
                                                                        {event.spot}
                                                                    </h3>
                                                                </div>
                                                                
                                                                {!event.spot.includes("搭機") && (
                                                                    <button 
                                                                        onClick={() => openNaverMap(event.kr)}
                                                                        className={`flex items-center justify-center gap-1 px-4 py-1.5 rounded-full text-xs font-black self-start md:self-auto transition-all shadow-sm active:scale-95 ${event.spot.includes("回到飯店休息") ? "bg-slate-100 text-slate-500 border border-slate-200" : "bg-rose-50 text-rose-500 border border-rose-100 hover:bg-rose-500 hover:text-white"}`}
                                                                    >
                                                                        <Icon name="navigation" size={12} fill="currentColor" /> NAVER 導航
                                                                    </button>
                                                                )}
                                                            </div>

                                                            <div className="flex flex-wrap items-center gap-x-3 gap-y-1">
                                                                <p className="text-slate-400 font-bold text-[10px] md:text-xs uppercase tracking-tighter">{event.kr}</p>
                                                                <div className="flex items-center gap-2">
                                                                    {event.duration !== "-" && (
                                                                        <span className="text-[10px] text-slate-500 font-bold flex items-center gap-1">
                                                                            <Icon name="clock" size={10} /> {event.duration}
                                                                        </span>
                                                                    )}
                                                                    {event.transport && (
                                                                        <span className="text-[10px] text-slate-500 font-bold flex items-center gap-1">
                                                                            {actualIdx >= 6 ? <Icon name="train" size={10} className="text-blue-400" /> : <Icon name="car" size={10} className="text-emerald-400" />} 
                                                                            {event.transport}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            </div>
                                                            
                                                            {event.note && (
                                                                <div className={`text-xs p-2.5 rounded-xl border-l-4 italic shadow-sm leading-relaxed ${event.spot.includes("回到飯店休息") ? "bg-slate-50 text-slate-400 border-slate-200" : "bg-rose-50/80 text-slate-500 border-rose-200"}`}>
                                                                    {event.note}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // --- 初始化渲染 ---
        window.onload = function() {
            try {
                const rootElement = document.getElementById('root');
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            } catch (err) {
                console.error("React Render Error:", err);
                document.getElementById('root').innerHTML = "<div class='p-10 text-center text-red-500 font-bold'>發生錯誤，請重新載入網頁。</div>";
            }
        };
    </script>
</body>
</html>
