                { time: "10:30", spot: "星空圖書館", kr: "별마당 도서관", duration: "1.5hr", transport: "地鐵 40min", note: "地鐵 2 號線【三成站】5/6號出口 或 9 號線【奉恩寺站】7號出口" },
                { time: "12:30", spot: "樂天世界/樂天塔", kr: "롯데월드", duration: "3hr", transport: "地鐵 15min", note: "地鐵 2、8 號線【蠶室站】1/2/3/4號出口" },
                { time: "17:00", spot: "功夫秀", kr: "명보아트홀 점프", duration: "1.5hr", transport: "地鐵 45min", note: "明甫藝術館。地鐵 2、3 號線【乙支路 3 街站】8號出口 或 3、4 號線【忠武路站】7號出口" },
                { time: "19:00", spot: "晚餐 (鐘路/明洞)", kr: "식사", duration: "2hr", transport: "步行 10min", note: "鄰近地鐵 4 號線【明洞站】或 2 號線【乙支路入口站】" },
                { time: "21:30", spot: "回到飯店休息", kr: "호텔 부티크 9", duration: "-", transport: "地鐵 10min", note: "最後一晚" }
            ]},
            { day: "Day 11", date: "4/02 (四)", location: "歸賦", hotel: "Sweet Home", events: [
                { time: "10:00", spot: "從飯店出發", kr: "호텔 부티크 9", duration: "-", transport: "", note: "退房並寄放行李，前往首爾站" },
                { time: "11:00", spot: "樂天超市", kr: "롯데마트 서울역점", duration: "2.5hr", transport: "地鐵 15min", note: "【首爾站】1號出口。蜜月最後採買伴手禮並打包。" },
                { time: "13:30", spot: "午餐 (首爾站附近)", kr: "식사", duration: "1.5hr", transport: "步行", note: "推薦在首爾站或樂天百貨內享用。" },
                { time: "15:30", spot: "明洞商圈", kr: "명동거리", duration: "3.5hr", transport: "地鐵 5min", note: "【明洞站】最後補貨或去南山塔俯瞰首爾。19:30回到首爾站取行李。" },
                { time: "19:40", spot: "前往機場", kr: "인천국제공항", duration: "1hr", transport: "AREX", note: "搭乘機場快線直通列車(AREX)前往仁川機場。" },
                { time: "20:50", spot: "抵達仁川機場 T1", kr: "인천국제공항 1터미널", duration: "2hr", transport: "-", note: "航班 TR 873 (23:00) 於 Terminal 1。建議提早 2-3 小時辦理登機與退稅。" }
            ]}
        ];

        const openNaverMap = (query) => {
            if (!query) return;
            const url = `https://map.naver.com/v5/search/${encodeURIComponent(query)}`;
            window.open(url, '_blank');
        };

        const UnifiedMap = ({ selectedDayIndex }) => {
            const [activeLabelIdx, setActiveLabelIdx] = useState(null);
            const isSeoul = selectedDayIndex >= 6;
            const coords = isSeoul ? seoulCoords : jejuCoords;
            const currentDayEvents = selectedDayIndex !== null ? itineraryData[selectedDayIndex].events : [];
            
            const points = currentDayEvents
                .map(e => ({ ...coords[e.kr] || coords[e.spot], name: e.spot, kr: e.kr }))
                .filter(p => p.x !== undefined && p.x > 0);

            const getLabelPos = (p) => {
                const isHotel = p.type === 'hotel';
                const offset = isHotel ? 16 : 8; 
                const labelWidth = (p.name || "").length * 10 + 16;
                const labelHeight = 20;
                let lx = p.x + offset;
                let ly = p.y - labelHeight / 2;
                if (p.dir === "top") { lx = p.x - labelWidth / 2; ly = p.y - offset - labelHeight; }
                if (p.dir === "bottom") { lx = p.x - labelWidth / 2; ly = p.y + offset; }
                if (p.dir === "left") { lx = p.x - offset - labelWidth; ly = p.y - labelHeight / 2; }
                if (p.dir === "right") { lx = p.x + offset; ly = p.y - labelHeight / 2; }
                lx = Math.max(5, Math.min(lx, 395 - labelWidth));
                ly = Math.max(5, Math.min(ly, 245 - labelHeight));
                return { x: lx, y: ly, w: labelWidth, h: labelHeight };
            };

            return (
                <div className="bg-white p-3 md:p-6 rounded-2xl md:rounded-3xl shadow-lg border border-rose-100 mb-6 overflow-hidden">
                    <div className="flex items-center justify-between mb-3">
                        <div className="flex items-center gap-2 text-rose-500 font-bold text-sm md:text-base">
                            <Icon name="map" size={18} />
                            <span>{isSeoul ? "首爾市區" : "濟州島地區"} 路線圖</span>
                        </div>
                        <span className="bg-rose-50 px-2 py-0.5 rounded-full text-[9px] text-rose-400 font-bold border border-rose-100 uppercase tracking-widest">
                            連點兩下標籤導覽
                        </span>
                    </div>
                    
                    <div className="relative aspect-[16/10] bg-blue-50/30 rounded-xl border border-blue-50 shadow-inner overflow-hidden touch-manipulation" onClick={() => setActiveLabelIdx(null)}>
                        <svg viewBox="0 0 400 250" className="w-full h-full transition-all duration-700">
                            {isSeoul ? (
                                <g>
                                    <path d="M50,140 Q150,150 250,130 T400,160" fill="none" stroke="#bae6fd" strokeWidth="12" opacity="0.3" /> 
                                    <path d="M100,60 Q200,40 300,60 T350,120 T300,180 T150,200 T50,140 Z" fill="#fff" stroke="#cbd5e1" strokeWidth="1" />
                                </g>
                            ) : (
                                <path d="M360,110 C390,140 350,190 300,210 C240,230 150,230 80,200 C30,170 10,120 40,70 C70,30 160,10 240,20 C320,30 340,80 360,110 Z" fill="#fff" stroke="#fb7185" strokeWidth="1.5" />
                            )}
                            {Object.entries(coords).map(([name, pos]) => (!pos.skip && <circle key={name} cx={pos.x} cy={pos.y} r="2" fill="#fda4af" opacity="0.15" />))}
                            {points.length > 1 && (<polyline points={points.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke="#fb7185" strokeWidth="1.5" strokeDasharray="5 3" opacity="0.4" />)}
                            
                            {points.filter(p => p.type !== 'hotel').map((p, i) => (
                                <circle key={`pt-${i}`} cx={p.x} cy={p.y} r="4" fill="#e11d48" className="shadow-sm" />
                            ))}

                            {points.filter(p => p.type === 'hotel').map((p, i) => (
                                <g key={`hotel-${i}`}>
                                    <rect x={p.x - 6} y={p.y - 6} width="12" height="12" rx="2" fill="#3b82f6" className="shadow-sm" />
                                    <path d={`M${p.x-3} ${p.y} h6 M${p.x-3} ${p.y+2} h6 M${p.x-3} ${p.y-2} v4 M${p.x+3} ${p.y-2} v4`} stroke="white" strokeWidth="1" />
                                </g>
                            ))}

                            {points.map((p, i) => {
                                if (i === activeLabelIdx) return null;
                                const l = getLabelPos(p);
                                return (
                                    <g key={`lbl-${i}`} className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setActiveLabelIdx(i); }}>
                                        <rect x={l.x} y={l.y} width={l.w} height={l.h} rx="4" fill="white" stroke={p.type === 'hotel' ? "#3b82f6" : "#fb7185"} strokeWidth="1" />
                                        <text x={l.x + l.w/2} y={l.y + l.h/2 + 3} fontSize="8" fontWeight="bold" fill="#334155" textAnchor="middle">{i + 1}. {p.name}</text>
                                    </g>
                                );
                            })}
                            {activeLabelIdx !== null && points[activeLabelIdx] && (
                                (() => {
                                    const p = points[activeLabelIdx];
                                    const l = getLabelPos(p);
                                    return (
                                        <g className="cursor-pointer" onClick={(e) => { e.stopPropagation(); openNaverMap(p.kr); }}>
                                            <rect x={l.x} y={l.y} width={l.w} height={l.h} rx="4" fill="white" stroke={p.type === 'hotel' ? "#2563eb" : "#e11d48"} strokeWidth="2" className="shadow-lg" />
                                            <text x={l.x + l.w/2} y={l.y + l.h/2 + 3} fontSize="8" fontWeight="black" fill={p.type === 'hotel' ? "#2563eb" : "#e11d48"} textAnchor="middle">{activeLabelIdx + 1}. {p.name}</text>
                                        </g>
                                    );
                                })()
                            )}
                        </svg>
                    </div>
                </div>
            );
        };

        function App() {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedDayIndex, setSelectedDayIndex] = useState(null);

            const filteredDays = useMemo(() => {
                if (searchTerm.trim()) {
                    return itineraryData.filter(day => 
                        day.events.some(event => 
                            event.spot.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            event.kr.includes(searchTerm)
                        )
                    );
                } else if (selectedDayIndex !== null) {
                    return itineraryData.filter((_, idx) => idx === selectedDayIndex);
                }
                return itineraryData;
            }, [searchTerm, selectedDayIndex]);

            return (
                <div className="min-h-screen bg-rose-50 p-2 md:p-8 font-sans text-slate-800 pb-20">
                    <div id="app-card" className="max-w-4xl mx-auto rounded-2xl md:rounded-3xl shadow-2xl overflow-hidden border border-rose-100 bg-white">
                        
                        <div className="bg-gradient-to-r from-rose-400 to-orange-300 p-5 md:p-8 text-white text-center">
                            <div className="flex justify-center items-center gap-2 mb-2">
                                <Icon name="heart" size={20} className="fill-white" />
                                <h1 className="text-2xl md:text-3xl font-black tracking-tight uppercase text-shadow-sm">Korea Honeymoon</h1>
                                <Icon name="heart" size={20} className="fill-white" />
                            </div>
                            <p className="opacity-90 text-sm md:text-lg italic mb-4 md:mb-6 text-shadow-sm font-bold tracking-widest">韓國蜜月旅行行程表 · 3.23 - 4.2</p>
                            
                            <div className="relative max-w-md mx-auto mb-6">
                                <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-rose-500" />
                                <input 
                                    type="text" 
                                    placeholder="搜尋全期景點..." 
                                    className="w-full pl-11 pr-4 py-2.5 rounded-full border-none text-slate-800 shadow-xl outline-none text-sm font-medium"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>

                            <div className="flex overflow-x-auto pb-4 gap-2 no-scrollbar px-1 touch-pan-x">
                                <button
                                    onClick={() => {setSelectedDayIndex(null); setSearchTerm('');}}
                                    className={`flex-shrink-0 px-5 py-2 rounded-xl text-xs font-black transition-all ${
                                        selectedDayIndex === null && !searchTerm ? 'bg-white text-rose-500 shadow-lg scale-105' : 'bg-rose-500/30 text-white'
                                    }`}
                                >
                                    ALL
                                </button>
                                {itineraryData.map((day, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => {setSelectedDayIndex(idx); setSearchTerm('');}}
                                        className={`flex-shrink-0 px-4 py-2 rounded-xl text-xs font-black transition-all text-center flex flex-col items-center min-w-[95px] ${
                                            selectedDayIndex === idx && !searchTerm ? 'bg-white text-rose-500 shadow-lg scale-105' : 'bg-rose-500/30 text-white hover:bg-rose-500/50'
                                        }`}
                                    >
                                        <span>DAY {idx + 1}</span>
                                        <span className="text-[8px] opacity-90 mt-0.5 font-bold tracking-tight">{day.date}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="px-3 md:px-8 mt-4 md:mt-6">
                            <UnifiedMap selectedDayIndex={selectedDayIndex} />
                        </div>

                        <div className="p-3 md:p-8">
                            {filteredDays.length === 0 ? (
                                <div className="text-center py-20 text-slate-400 text-sm font-bold">找不到相關景點。</div>
                            ) : (
                                filteredDays.map((day) => {
                                    const actualIdx = itineraryData.indexOf(day);
                                    const listDate = day.date.split(' ')[0];
                                    return (
                                        <div key={actualIdx} className="relative animate-fadeIn mb-10 md:mb-16">
                                            <div className="flex items-center gap-2 mb-8">
                                                <div className="bg-rose-500 text-white px-4 py-1.5 rounded-xl font-bold shadow-md flex items-center gap-1.5 text-sm">
                                                    <Icon name="calendar" size={14} /> {day.day} ({listDate})
                                                </div>
                                                <div className="text-slate-400 text-[10px] md:text-xs font-bold bg-slate-50 px-2 py-1 rounded-lg border border-slate-100 flex items-center gap-1">
                                                    <Icon name="mapPin" size={10} className="text-rose-400" /> {day.location}
                                                </div>
                                            </div>

                                            <div className="ml-2 md:ml-3 border-l-2 border-dashed border-rose-100 pl-6 md:pl-8 space-y-0">
                                                {day.events.map((event, eIdx) => (
                                                    <React.Fragment key={eIdx}>
                                                        {event.transport && event.transport !== "-" && (
                                                            <div className="py-2 -ml-[1px] flex items-center gap-2">
                                                                <div className="bg-white border border-rose-200 px-3 py-1 rounded-full text-[10px] font-black text-rose-500 shadow-sm flex items-center gap-1">
                                                                    {actualIdx >= 6 ? <Icon name="train" size={10} /> : <Icon name="car" size={10} />}
                                                                    🚗 交通 {event.transport}
                                                                </div>
                                                                <div className="flex-1 h-px border-t border-dashed border-rose-200"></div>
                                                            </div>
                                                        )}

                                                        <div className={`relative group py-4 transition-all ${event.spot.includes("休息") || event.spot.includes("出發") ? "opacity-90" : ""}`}>
                                                            <div className={`absolute -left-[31px] md:-left-[41px] top-6 w-4 h-4 md:w-5 md:h-5 rounded-full bg-white border-2 md:border-4 z-10 shadow-sm ${event.spot.includes("休息") || event.spot.includes("出發") ? "border-slate-300" : "border-rose-400"}`}></div>
                                                            <div className="flex flex-col gap-2">
                                                                <div className="flex flex-col md:flex-row md:items-start justify-between gap-1">
                                                                    <div className="flex items-baseline gap-2">
                                                                        <span className={`font-mono font-black text-base md:text-lg ${event.spot.includes("休息") || event.spot.includes("出發") ? "text-slate-400" : "text-rose-500"}`}>
                                                                            {event.time}
                                                                        </span>
                                                                        <h3 className={`font-black text-base md:text-xl leading-tight ${event.spot.includes("休息") || event.spot.includes("出發") ? "text-slate-400" : "text-black"}`}>
                                                                            {event.spot}
                                                                        </h3>
                                                                    </div>
                                                                    {!event.spot.includes("搭機") && (
                                                                        <button onClick={() => openNaverMap(event.kr)} className={`flex items-center justify-center gap-1 px-4 py-1.5 rounded-full text-xs font-black self-start md:self-auto transition-all shadow-sm active:scale-95 ${event.spot.includes("回到飯店休息") || event.spot.includes("從飯店出發") ? "bg-slate-100 text-slate-500 border border-slate-200" : "bg-rose-50 text-rose-500 border border-rose-100 hover:bg-rose-500 hover:text-white"}`}>
                                                                            <Icon name="navigation" size={12} fill="currentColor" /> NAVER 導航
                                                                        </button>
                                                                    )}
                                                                </div>
                                                                <div className="flex flex-wrap items-center gap-x-3 gap-y-1">
                                                                    <p className="text-slate-400 font-bold text-[10px] md:text-xs uppercase tracking-tighter">{event.kr}</p>
                                                                    <div className="flex items-center gap-2">
                                                                        {event.duration && event.duration !== "-" && (<span className="text-[10px] text-slate-500 font-bold flex items-center gap-1"><Icon name="clock" size={10} /> 預計停留 {event.duration}</span>)}
                                                                    </div>
                                                                </div>
                                                                {event.note && (<div className={`text-xs p-2.5 rounded-xl border-l-4 italic shadow-sm leading-relaxed ${event.spot.includes("休息") || event.spot.includes("出發") ? "bg-slate-50 text-slate-400 border-slate-200" : "bg-rose-50/80 text-slate-500 border-rose-200"}`}>{event.note}</div>)}
                                                            </div>
                                                        </div>
                                                    </React.Fragment>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
